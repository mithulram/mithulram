<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="150" viewBox="0 0 1280 150" role="img" aria-labelledby="title desc">
  <title>Proof at the boundary: uncertainty through validation to evidence</title>
  <desc>Decorative systems diagram showing uncertainty crossing a boundary gate through validate and quarantine to evidence.</desc>
  <rect width="1280" height="150" fill="#0f172a"/>
  <rect x="0.5" y="0.5" width="1279" height="149" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- boundary gate -->
  <rect x="318" y="38" width="4" height="74" fill="#94a3b8" opacity="0.35"/>
  <rect x="318" y="52" width="4" height="46" fill="#2dd4bf" opacity="0.85"/>
  <text x="320" y="128" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="9" fill="#64748b" letter-spacing="0.12em">BOUNDARY</text>

  <!-- signal rail -->
  <line x1="120" y1="75" x2="1160" y2="75" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 6"/>

  <!-- nodes -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="11" fill="#e2e8f0">
    <g transform="translate(120,75)">
      <circle r="14" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
      <circle r="4" fill="#94a3b8"/>
      <text y="34" text-anchor="middle" font-weight="600" letter-spacing="0.06em">UNCERTAINTY</text>
    </g>
    <g transform="translate(520,75)">
      <circle r="14" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
      <circle r="4" fill="#2dd4bf"/>
      <text y="34" text-anchor="middle" font-weight="600" letter-spacing="0.08em">VALIDATE</text>
    </g>
    <g transform="translate(780,75)">
      <circle r="14" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
      <circle r="4" fill="#60a5fa"/>
      <text y="34" text-anchor="middle" font-weight="600" letter-spacing="0.08em">QUARANTINE</text>
    </g>
    <g transform="translate(1160,75)">
      <circle r="14" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
      <circle r="4" fill="#2dd4bf"/>
      <text y="34" text-anchor="middle" font-weight="600" letter-spacing="0.08em">EVIDENCE</text>
    </g>
  </g>

  <!-- connectors -->
  <g stroke="#94a3b8" stroke-width="1.25" fill="none" opacity="0.55">
    <line x1="134" y1="75" x2="314" y2="75"/>
    <polygon points="314,75 306,71 306,79" fill="#94a3b8" stroke="none"/>
    <line x1="326" y1="75" x2="506" y2="75"/>
    <polygon points="506,75 498,71 498,79" fill="#94a3b8" stroke="none"/>
    <line x1="534" y1="75" x2="766" y2="75"/>
    <polygon points="766,75 758,71 758,79" fill="#94a3b8" stroke="none"/>
    <line x1="794" y1="75" x2="1146" y2="75"/>
    <polygon points="1146,75 1138,71 1138,79" fill="#94a3b8" stroke="none"/>
  </g>

  <text x="640" y="28" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" fill="#64748b" letter-spacing="0.14em">PROOF AT THE BOUNDARY</text>
</svg>
