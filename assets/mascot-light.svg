<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-labelledby="title desc">
  <title>Mithu  boundary engineer mascot</title>
  <desc>A friendly mint blob mascot with glasses and a laptop, representing a software engineer who validates at the boundary.</desc>
  <circle cx="100" cy="108" r="72" fill="#14b8a6" opacity="0.15"/>
  <ellipse cx="100" cy="112" rx="68" ry="62" fill="#1e3a5f"/>
  <ellipse cx="100" cy="118" rx="58" ry="52" fill="#0f2744"/>
  <!-- eyes -->
  <circle cx="78" cy="98" r="14" fill="#f8fafc"/>
  <circle cx="122" cy="98" r="14" fill="#f8fafc"/>
  <circle cx="82" cy="100" r="7" fill="#0f172a"/>
  <circle cx="126" cy="100" r="7" fill="#0f172a"/>
  <circle cx="84" cy="97" r="2.5" fill="#f8fafc"/>
  <circle cx="128" cy="97" r="2.5" fill="#f8fafc"/>
  <!-- glasses -->
  <rect x="62" y="86" width="36" height="26" rx="8" fill="none" stroke="#14b8a6" stroke-width="3"/>
  <rect x="102" y="86" width="36" height="26" rx="8" fill="none" stroke="#14b8a6" stroke-width="3"/>
  <line x1="98" y1="99" x2="102" y2="99" stroke="#14b8a6" stroke-width="3"/>
  <!-- smirk -->
  <path d="M 86 128 Q 100 138 114 128" fill="none" stroke="#14b8a6" stroke-width="3" stroke-linecap="round"/>
  <!-- laptop -->
  <rect x="68" y="142" width="64" height="36" rx="4" fill="#334155"/>
  <rect x="72" y="146" width="56" height="24" rx="2" fill="#14b8a6" opacity="0.35"/>
  <text x="100" y="162" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#e2e8f0">&gt; ok</text>
  <rect x="60" y="176" width="80" height="6" rx="2" fill="#475569"/>
  <!-- antenna -->
  <line x1="100" y1="50" x2="100" y2="62" stroke="#14b8a6" stroke-width="3"/>
  <circle cx="100" cy="44" r="6" fill="#14b8a6"/>
  <text x="100" y="28" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" font-weight="700" fill="#64748b" letter-spacing="0.08em">ONLINE</text>
</svg>
